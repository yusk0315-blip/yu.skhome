<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#a24c49"><meta name="description" content="値札を、あなたが働く時間に変換して判断しやすく。"><title>欲しい物は労働何時間分？｜無料アプリ</title><style>
:root{--bg:#f4f1e9;--paper:#fffefa;--ink:#18211d;--muted:#69736d;--accent:#a24c49;--line:rgba(24,33,29,.13);--shadow:0 18px 50px rgba(24,33,29,.09)}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans JP",sans-serif;background:radial-gradient(circle at 8% 0%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 28rem),linear-gradient(180deg,var(--bg),#e9e6dd);min-height:100vh}button,input{font:inherit}.wrap{width:min(100% - 28px,980px);margin:auto;padding:20px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.home{color:var(--accent);text-decoration:none;font-weight:800;font-size:13px}.count{padding:7px 11px;border-radius:999px;background:#fff;color:var(--accent);font-size:12px;font-weight:900}.hero,.card{border:1px solid var(--line);background:var(--paper);box-shadow:var(--shadow)}.hero{padding:clamp(26px,6vw,54px);border-radius:30px;position:relative;overflow:hidden}.hero:after{content:"⏱️";position:absolute;right:4%;bottom:-22px;font-size:clamp(90px,18vw,170px);opacity:.07}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.16em}h1{max-width:730px;margin:13px 0 10px;font:700 clamp(30px,6vw,54px)/1.3 Georgia,"Yu Mincho",serif;letter-spacing:-.04em}.lead{max-width:650px;margin:0;color:var(--muted);line-height:1.85}.layout{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;margin-top:18px}.card{border-radius:22px;padding:22px}h2{margin:0 0 17px;font:700 21px/1.5 Georgia,"Yu Mincho",serif}.fields{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:700}.input{position:relative}.input input{width:100%;min-height:48px;padding:10px 52px 10px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:16px}.input span{position:absolute;right:12px;top:14px;color:var(--muted);font-size:12px}.input input:focus{outline:3px solid color-mix(in srgb,var(--accent) 20%,transparent);border-color:var(--accent)}.run{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:900;cursor:pointer}.fine{margin:15px 0 0;color:var(--muted);font-size:11px;line-height:1.7}.big{margin:8px 0;color:var(--accent);font:800 clamp(30px,6vw,50px)/1.16 Georgia,serif}.sub{color:var(--muted);line-height:1.7}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:20px}.kpi{padding:13px;border-radius:15px;background:#f3f4ef;border:1px solid var(--line)}.kpi small{display:block;color:var(--muted);line-height:1.4}.kpi b{display:block;margin-top:6px;font-size:16px}.advice{margin-top:17px;padding:16px;border-left:4px solid var(--accent);border-radius:10px;background:#f8f5ed;line-height:1.85;font-size:14px}.quiz{display:grid;gap:12px}.q{padding:13px;border:1px solid var(--line);border-radius:14px}.q p{margin:0 0 9px;font-size:14px;font-weight:700}.choices{display:flex;gap:8px}.choices label{flex:1}.choices input{position:absolute;opacity:0}.choices span{display:block;padding:9px;text-align:center;border:1px solid var(--line);border-radius:10px;font-size:12px;cursor:pointer}.choices input:checked+span{background:var(--accent);color:white;border-color:var(--accent)}@media(max-width:760px){.layout{grid-template-columns:1fr}.fields{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}.hero{border-radius:24px}}
</style></head><body><main class="wrap"><div class="top"><a class="home" href="../../#apps">← 無料アプリ一覧へ</a><span class="count">APP 036 / 100</span></div><section class="hero"><div class="eyebrow">TIME VALUE</div><h1>欲しい物は労働何時間分？</h1><p class="lead">値札を、あなたが働く時間に変換して判断しやすく。</p></section><div class="layout"><section class="card"><h2>数字を入力</h2><div class="fields"><div class="field"><label for="price">欲しい物の価格</label><div class="input"><input id="price" type="number" value="80000" step="any"><span>円</span></div></div><div class="field"><label for="takehome">月の手取り</label><div class="input"><input id="takehome" type="number" value="300000" step="any"><span>円</span></div></div><div class="field"><label for="workDays">月の勤務日数</label><div class="input"><input id="workDays" type="number" value="21" step="any"><span>日</span></div></div><div class="field"><label for="hours">1日の勤務時間</label><div class="input"><input id="hours" type="number" value="8" step="any"><span>時間</span></div></div><div class="field"><label for="commute">1日の通勤時間</label><div class="input"><input id="commute" type="number" value="1" step="any"><span>時間</span></div></div></div><button class="run" id="run">結果を見る</button><p class="fine">入力内容はこの端末だけに保存されます。結果は一般的な目安です。</p></section><section class="card" aria-live="polite"><div class="sub">あなたの結果</div><div class="big" id="main">—</div><div class="sub" id="sub">入力して結果を確認してください</div><div class="kpis" id="kpis"></div><div class="advice" id="advice">結果に合わせた次の一手を表示します。</div></section></div></main><script>const ids=["price","takehome","workDays","hours","commute"],el=id=>document.getElementById(id),n=id=>Number(el(id).value)||0,yen=v=>Math.round(v).toLocaleString("ja-JP")+"円",pct=v=>(v*100).toFixed(1)+"%";function calculate(){const result=(()=>{const price=n("price"),total=Math.max(1,n("workDays")*(n("hours")+n("commute"))),hourly=n("takehome")/total,need=price/Math.max(1,hourly),days=need/Math.max(1,n("hours")+n("commute"));return {main:need.toFixed(1)+"時間分",sub:"約 "+days.toFixed(1)+"勤務日分の価値",kpis:[["実質時給",yen(hourly)],["30回使うなら",yen(price/30)+"/回"],["100回使うなら",yen(price/100)+"/回"]],advice:days>10?"2週間近い労働と交換する買い物です。使用回数と中古売却額まで確認してから決めましょう。":days>3?"数日分の労働です。買った後の満足が長く続くか、7日置いて判断しましょう。":"時間コストは比較的小さめ。家計の予算内なら、使用頻度を基準に決めて大丈夫です。"}})();el("main").textContent=result.main;el("sub").textContent=result.sub;el("kpis").innerHTML=result.kpis.map(x=>'<div class="kpi"><small>'+x[0]+'</small><b>'+x[1]+'</b></div>').join("");el("advice").textContent=result.advice;ids.forEach(id=>localStorage.setItem("work-hours-price_"+id,el(id).value))}ids.forEach(id=>{const v=localStorage.getItem("work-hours-price_"+id);if(v!==null)el(id).value=v;el(id).addEventListener("change",calculate)});el("run").addEventListener("click",calculate);calculate();</script></body></html>
