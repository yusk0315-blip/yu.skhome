<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#65538a"><meta name="description" content="8問で、貯め方・使い方・増やし方のクセを診断。"><title>お金タイプ診断｜無料アプリ</title><style>
:root{--bg:#f4f1e9;--paper:#fffefa;--ink:#18211d;--muted:#69736d;--accent:#65538a;--line:rgba(24,33,29,.13);--shadow:0 18px 50px rgba(24,33,29,.09)}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans JP",sans-serif;background:radial-gradient(circle at 8% 0%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 28rem),linear-gradient(180deg,var(--bg),#e9e6dd);min-height:100vh}button,input{font:inherit}.wrap{width:min(100% - 28px,980px);margin:auto;padding:20px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.home{color:var(--accent);text-decoration:none;font-weight:800;font-size:13px}.count{padding:7px 11px;border-radius:999px;background:#fff;color:var(--accent);font-size:12px;font-weight:900}.hero,.card{border:1px solid var(--line);background:var(--paper);box-shadow:var(--shadow)}.hero{padding:clamp(26px,6vw,54px);border-radius:30px;position:relative;overflow:hidden}.hero:after{content:"🧭";position:absolute;right:4%;bottom:-22px;font-size:clamp(90px,18vw,170px);opacity:.07}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.16em}h1{max-width:730px;margin:13px 0 10px;font:700 clamp(30px,6vw,54px)/1.3 Georgia,"Yu Mincho",serif;letter-spacing:-.04em}.lead{max-width:650px;margin:0;color:var(--muted);line-height:1.85}.layout{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;margin-top:18px}.card{border-radius:22px;padding:22px}h2{margin:0 0 17px;font:700 21px/1.5 Georgia,"Yu Mincho",serif}.fields{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:700}.input{position:relative}.input input{width:100%;min-height:48px;padding:10px 52px 10px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:16px}.input span{position:absolute;right:12px;top:14px;color:var(--muted);font-size:12px}.input input:focus{outline:3px solid color-mix(in srgb,var(--accent) 20%,transparent);border-color:var(--accent)}.run{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:900;cursor:pointer}.fine{margin:15px 0 0;color:var(--muted);font-size:11px;line-height:1.7}.big{margin:8px 0;color:var(--accent);font:800 clamp(30px,6vw,50px)/1.16 Georgia,serif}.sub{color:var(--muted);line-height:1.7}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:20px}.kpi{padding:13px;border-radius:15px;background:#f3f4ef;border:1px solid var(--line)}.kpi small{display:block;color:var(--muted);line-height:1.4}.kpi b{display:block;margin-top:6px;font-size:16px}.advice{margin-top:17px;padding:16px;border-left:4px solid var(--accent);border-radius:10px;background:#f8f5ed;line-height:1.85;font-size:14px}.quiz{display:grid;gap:12px}.q{padding:13px;border:1px solid var(--line);border-radius:14px}.q p{margin:0 0 9px;font-size:14px;font-weight:700}.choices{display:flex;gap:8px}.choices label{flex:1}.choices input{position:absolute;opacity:0}.choices span{display:block;padding:9px;text-align:center;border:1px solid var(--line);border-radius:10px;font-size:12px;cursor:pointer}.choices input:checked+span{background:var(--accent);color:white;border-color:var(--accent)}@media(max-width:760px){.layout{grid-template-columns:1fr}.fields{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}.hero{border-radius:24px}}
</style></head><body><main class="wrap"><div class="top"><a class="home" href="../../#apps">← 無料アプリ一覧へ</a><span class="count">APP 037 / 100</span></div><section class="hero"><div class="eyebrow">MONEY TYPE</div><h1>お金タイプ診断</h1><p class="lead">8問で、貯め方・使い方・増やし方のクセを診断。</p></section><div class="layout"><section class="card"><h2>8つの質問</h2>
    <div class="quiz" id="quiz"></div><button class="run" id="run">診断結果を見る</button><p class="fine">入力内容はこの端末だけに保存されます。結果は一般的な目安です。</p></section><section class="card" aria-live="polite"><div class="sub">あなたの結果</div><div class="big" id="main">—</div><div class="sub" id="sub">入力して結果を確認してください</div><div class="kpis" id="kpis"></div><div class="advice" id="advice">結果に合わせた次の一手を表示します。</div></section></div></main><script>const questions=["臨時収入はすぐ使いたくなる","毎月の貯金額を先に決めている","投資は値動きが怖くて避けがち","欲しい物は比較してから買う","資産額を月1回以上確認する","将来より今の体験にお金を使いたい","固定費を定期的に見直している","一発逆転できる投資に惹かれる"];const quiz=document.getElementById("quiz"),el=id=>document.getElementById(id);quiz.innerHTML=questions.map((q,i)=>'<div class="q"><p>'+(i+1)+'. '+q+'</p><div class="choices">'+["いいえ","どちらとも","はい"].map((v,j)=>'<label><input type="radio" name="q'+i+'" value="'+j+'" '+((localStorage.getItem("money_q"+i)||"1")==j?"checked":"")+'><span>'+v+'</span></label>').join("")+'</div></div>').join("");function calculate(){let a=[...Array(8)].map((_,i)=>Number(document.querySelector('input[name="q'+i+'"]:checked')?.value||1));a.forEach((v,i)=>localStorage.setItem("money_q"+i,v));let defense=a[1]+a[3]+a[4]+a[6],enjoy=a[0]+a[5],risk=a[7]+(2-a[2]);let type,sub,advice;if(defense>=6){type="堅実設計型";sub="貯める仕組みを作るのが得意";advice="守りは十分。使う目的を決めた予算と、長期の積立投資を組み合わせると強みが活きます。"}else if(enjoy>=3){type="今を楽しむ体験型";sub="満足度の高い支出を大切にする";advice="楽しみを削るより、先取りで最低額だけ貯める仕組みが向いています。残りは気持ちよく使いましょう。"}else if(risk>=3){type="挑戦リターン型";sub="増やすチャンスへの反応が速い";advice="挑戦枠に上限を設け、生活防衛資金と長期積立を別口座にすると強みを安全に活かせます。"}else{type="バランス調整型";sub="状況に合わせて柔軟に判断する";advice="大きな弱点はありません。目標を1つ決め、自動積立と月1回の確認で迷いを減らしましょう。"}el("main").textContent=type;el("sub").textContent=sub;el("kpis").innerHTML=[["守る力",defense+"/8"],["楽しむ力",enjoy+"/4"],["挑戦する力",risk+"/4"]].map(x=>'<div class="kpi"><small>'+x[0]+'</small><b>'+x[1]+'</b></div>').join("");el("advice").textContent=advice}el("run").addEventListener("click",calculate);calculate();</script></body></html>
