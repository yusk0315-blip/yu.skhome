<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#a26435"><meta name="description" content="進学までに必要な金額と、毎月の積立額を逆算。"><title>教育費準備チェッカー｜無料アプリ</title><style>
:root{--bg:#f4f1e9;--paper:#fffefa;--ink:#18211d;--muted:#69736d;--accent:#a26435;--line:rgba(24,33,29,.13);--shadow:0 18px 50px rgba(24,33,29,.09)}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans JP",sans-serif;background:radial-gradient(circle at 8% 0%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 28rem),linear-gradient(180deg,var(--bg),#e9e6dd);min-height:100vh}button,input{font:inherit}.wrap{width:min(100% - 28px,980px);margin:auto;padding:20px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.home{color:var(--accent);text-decoration:none;font-weight:800;font-size:13px}.count{padding:7px 11px;border-radius:999px;background:#fff;color:var(--accent);font-size:12px;font-weight:900}.hero,.card{border:1px solid var(--line);background:var(--paper);box-shadow:var(--shadow)}.hero{padding:clamp(26px,6vw,54px);border-radius:30px;position:relative;overflow:hidden}.hero:after{content:"🎓";position:absolute;right:4%;bottom:-22px;font-size:clamp(90px,18vw,170px);opacity:.07}.eyebrow{color:var(--accent);font-size:12px;font-weight:900;letter-spacing:.16em}h1{max-width:730px;margin:13px 0 10px;font:700 clamp(30px,6vw,54px)/1.3 Georgia,"Yu Mincho",serif;letter-spacing:-.04em}.lead{max-width:650px;margin:0;color:var(--muted);line-height:1.85}.layout{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;margin-top:18px}.card{border-radius:22px;padding:22px}h2{margin:0 0 17px;font:700 21px/1.5 Georgia,"Yu Mincho",serif}.fields{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:700}.input{position:relative}.input input{width:100%;min-height:48px;padding:10px 52px 10px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:16px}.input span{position:absolute;right:12px;top:14px;color:var(--muted);font-size:12px}.input input:focus{outline:3px solid color-mix(in srgb,var(--accent) 20%,transparent);border-color:var(--accent)}.run{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:900;cursor:pointer}.fine{margin:15px 0 0;color:var(--muted);font-size:11px;line-height:1.7}.big{margin:8px 0;color:var(--accent);font:800 clamp(30px,6vw,50px)/1.16 Georgia,serif}.sub{color:var(--muted);line-height:1.7}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:20px}.kpi{padding:13px;border-radius:15px;background:#f3f4ef;border:1px solid var(--line)}.kpi small{display:block;color:var(--muted);line-height:1.4}.kpi b{display:block;margin-top:6px;font-size:16px}.advice{margin-top:17px;padding:16px;border-left:4px solid var(--accent);border-radius:10px;background:#f8f5ed;line-height:1.85;font-size:14px}.quiz{display:grid;gap:12px}.q{padding:13px;border:1px solid var(--line);border-radius:14px}.q p{margin:0 0 9px;font-size:14px;font-weight:700}.choices{display:flex;gap:8px}.choices label{flex:1}.choices input{position:absolute;opacity:0}.choices span{display:block;padding:9px;text-align:center;border:1px solid var(--line);border-radius:10px;font-size:12px;cursor:pointer}.choices input:checked+span{background:var(--accent);color:white;border-color:var(--accent)}@media(max-width:760px){.layout{grid-template-columns:1fr}.fields{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}.hero{border-radius:24px}}
</style></head><body><main class="wrap"><div class="top"><a class="home" href="../../#apps">← 無料アプリ一覧へ</a><span class="count">APP 035 / 100</span></div><section class="hero"><div class="eyebrow">EDUCATION</div><h1>教育費準備チェッカー</h1><p class="lead">進学までに必要な金額と、毎月の積立額を逆算。</p></section><div class="layout"><section class="card"><h2>数字を入力</h2><div class="fields"><div class="field"><label for="childAge">子どもの現在年齢</label><div class="input"><input id="childAge" type="number" value="3" step="any"><span>歳</span></div></div><div class="field"><label for="collegeAge">準備期限の年齢</label><div class="input"><input id="collegeAge" type="number" value="18" step="any"><span>歳</span></div></div><div class="field"><label for="target">準備したい金額</label><div class="input"><input id="target" type="number" value="5000000" step="any"><span>円</span></div></div><div class="field"><label for="saved">現在の教育資金</label><div class="input"><input id="saved" type="number" value="1000000" step="any"><span>円</span></div></div><div class="field"><label for="monthly">毎月の積立</label><div class="input"><input id="monthly" type="number" value="20000" step="any"><span>円</span></div></div><div class="field"><label for="rate">想定利回り</label><div class="input"><input id="rate" type="number" value="3" step="any"><span>%</span></div></div></div><button class="run" id="run">結果を見る</button><p class="fine">入力内容はこの端末だけに保存されます。結果は一般的な目安です。</p></section><section class="card" aria-live="polite"><div class="sub">あなたの結果</div><div class="big" id="main">—</div><div class="sub" id="sub">入力して結果を確認してください</div><div class="kpis" id="kpis"></div><div class="advice" id="advice">結果に合わせた次の一手を表示します。</div></section></div></main><script>const ids=["childAge","collegeAge","target","saved","monthly","rate"],el=id=>document.getElementById(id),n=id=>Number(el(id).value)||0,yen=v=>Math.round(v).toLocaleString("ja-JP")+"円",pct=v=>(v*100).toFixed(1)+"%";function calculate(){const result=(()=>{const months=Math.max(1,(n("collegeAge")-n("childAge"))*12),target=n("target"),saved=n("saved"),m=n("monthly"),r=n("rate")/100/12;let future=saved;for(let i=0;i<months;i++)future=(future+m)*(1+r);let lo=0,hi=1000000;for(let j=0;j<50;j++){let mid=(lo+hi)/2,v=saved;for(let i=0;i<months;i++)v=(v+mid)*(1+r);v>=target?hi=mid:lo=mid}const gap=Math.max(0,target-future);return {main:future>=target?"準備達成見込み":"あと "+yen(gap),sub:(months/12).toFixed(0)+"年後の見込み "+yen(future),kpis:[["目標額",yen(target)],["必要な毎月積立",yen(hi)],["今との差",yen(Math.max(0,hi-m))]],advice:future>=target?"今の計画で目標に届く見込みです。家計を圧迫しない範囲で継続しましょう。":hi<=m*1.3?"少しの増額で届きます。児童手当やボーナスの一部を教育費へ固定すると続けやすいです。":"月額だけで無理をせず、目標額・進路・ボーナス積立を組み合わせて調整しましょう。"}})();el("main").textContent=result.main;el("sub").textContent=result.sub;el("kpis").innerHTML=result.kpis.map(x=>'<div class="kpi"><small>'+x[0]+'</small><b>'+x[1]+'</b></div>').join("");el("advice").textContent=result.advice;ids.forEach(id=>localStorage.setItem("education-fund_"+id,el(id).value))}ids.forEach(id=>{const v=localStorage.getItem("education-fund_"+id);if(v!==null)el(id).value=v;el(id).addEventListener("change",calculate)});el("run").addEventListener("click",calculate);calculate();</script></body></html>
